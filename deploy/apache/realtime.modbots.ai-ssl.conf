<VirtualHost *:443>
    ServerName realtime.modbots.ai

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /v1/rooms/ ws://77.68.50.14/v1/rooms/
    ProxyPassReverse /v1/rooms/ ws://77.68.50.14/v1/rooms/
    ProxyPass / http://77.68.50.14/
    ProxyPassReverse / http://77.68.50.14/

    SSLEngine On
    SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key

    ErrorLog ${APACHE_LOG_DIR}/error-realtime.modbots.ai-ssl.log
    CustomLog ${APACHE_LOG_DIR}/access-realtime.modbots.ai-ssl.log combined
</VirtualHost>
