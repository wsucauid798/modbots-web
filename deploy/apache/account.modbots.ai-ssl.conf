<VirtualHost *:443>
    ServerName account.modbots.ai

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://77.68.50.14:8447/
    ProxyPassReverse / http://77.68.50.14:8447/

    SSLEngine On
    SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key

    ErrorLog ${APACHE_LOG_DIR}/error-account.modbots.ai-ssl.log
    CustomLog ${APACHE_LOG_DIR}/access-account.modbots.ai-ssl.log combined
</VirtualHost>
