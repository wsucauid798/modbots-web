<VirtualHost *:80>
    ServerName modbots.ai
    ServerAlias www.modbots.ai

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    ErrorLog ${APACHE_LOG_DIR}/error-modbots-web.log
    CustomLog ${APACHE_LOG_DIR}/access-modbots-web.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName modbots.ai
    ServerAlias www.modbots.ai

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    SSLEngine On
    SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key

    ErrorLog ${APACHE_LOG_DIR}/error-modbots-web-ssl.log
    CustomLog ${APACHE_LOG_DIR}/access-modbots-web-ssl.log combined
</VirtualHost>
