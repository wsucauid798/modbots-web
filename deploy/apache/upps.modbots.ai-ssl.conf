<VirtualHost *:443>
    ServerName upps.modbots.ai

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://77.68.50.14:3010/
    ProxyPassReverse / http://77.68.50.14:3010/

    SSLEngine On
    SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key

    ErrorLog ${APACHE_LOG_DIR}/error-upps.modbots.ai-ssl.log
    CustomLog ${APACHE_LOG_DIR}/access-upps.modbots.ai-ssl.log combined
</VirtualHost>
