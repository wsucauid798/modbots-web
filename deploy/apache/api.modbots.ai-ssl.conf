<VirtualHost *:443>
    ServerName api.modbots.ai

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://77.68.50.14:8443/
    ProxyPassReverse / http://77.68.50.14:8443/

    SSLEngine On
    SSLCertificateFile /etc/ssl/certs/ssl-cert-snakeoil.pem
    SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key

    ErrorLog ${APACHE_LOG_DIR}/error-api.modbots.ai-ssl.log
    CustomLog ${APACHE_LOG_DIR}/access-api.modbots.ai-ssl.log combined
</VirtualHost>
